# Stack local para desenvolvimento/teste (NÃO usar no Coolify — para isso use docker-compose.yml).
# Diferenças em relação ao docker-compose.yml de deploy:
#   - publica a porta 8090 no host (ports, não expose) para acessar http://localhost:8090
#   - credenciais do superusuário do worker têm um valor padrão para uso local
#     (sobrescreva criando um arquivo ".env" ao lado deste compose, se quiser)
#   - healthcheck no pocketbase para o worker só subir depois que a API responder
#   - volume de dados separado (pb_data_local) para não colidir com o volume de produção

services:
  pocketbase:
    build:
      context: ./backend
      args:
        PB_VERSION: "0.39.7"
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data_local:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_hooks:/pb/pb_hooks
    environment:
      - TZ=America/Sao_Paulo
      # URL do frontend web local (porta padrão do `npm run dev` do SvelteKit) —
      # usada no link do e-mail de "esqueci a senha".
      - PB_FRONTEND_URL=${PB_FRONTEND_URL:-http://localhost:5173}
      # Usados só no boot pra garantir (upsert) o superuser — ver backend/entrypoint.sh.
      # Mesmo default do import-worker abaixo, pra não precisar criar na mão.
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@local.dev}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-SenhaLocal123!}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  import-worker:
    build:
      context: ./import-worker
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
      - PB_URL=http://pocketbase:8090
      # Precisam bater com o superusuário criado no passo 2 do guia de testes local.
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@local.dev}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-SenhaLocal123!}

volumes:
  pb_data_local:
