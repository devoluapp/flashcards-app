# Dispara um deploy no Coolify só quando uma tag de versão semântica (ex.: v1.4.0)
# é empurrada — pushes normais na branch NÃO disparam deploy (isso é intencional:
# o webhook automático de push fica desligado nos dois recursos do Coolify, ver
# DEPLOY-COOLIFY.md na raiz deste repo). Como a tag normalmente é criada em cima do
# commit que já está na ponta da branch configurada no Coolify, o deploy pega
# exatamente esse commit — backend e frontend saem sempre na mesma versão.
name: Deploy no Coolify (release)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # PUBLIC_APP_VERSION é lida em build time pelo SvelteKit ($env/static/public,
      # embutida no bundle) — precisa estar certa ANTES do Coolify buildar o frontend.
      - name: Atualizar PUBLIC_APP_VERSION do frontend no Coolify
        run: |
          curl --fail --silent --show-error --request PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${{ secrets.COOLIFY_FRONTEND_UUID }}/envs" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"key\": \"PUBLIC_APP_VERSION\", \"value\": \"${{ github.ref_name }}\"}"

      # Um único POST pode deployar as duas UUIDs (lista separada por vírgula) —
      # backend e frontend sobem juntos, na mesma release.
      - name: Disparar deploy de backend + frontend no Coolify
        run: |
          curl --fail --silent --show-error --request POST \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_BACKEND_UUID }},${{ secrets.COOLIFY_FRONTEND_UUID }}&force=true" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
