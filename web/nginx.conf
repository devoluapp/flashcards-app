server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota que não seja um arquivo real (ex.: /decks/abc123) cai no
    # shell client-side em index.html (SvelteKit com adapter-static + fallback).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados com hash no nome (build/_app/immutable/**) -> cache longo.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
